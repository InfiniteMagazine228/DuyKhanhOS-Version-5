name: Build DuyKhanhOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update

        sudo apt install -y \
          debootstrap \
          squashfs-tools \
          xorriso \
          grub-pc-bin \
          grub-efi-amd64-bin \
          grub2-common \
          mtools \
          dosfstools \
          rsync \
          curl \
          wget

    - name: Build rootfs
      run: |
        chmod +x scripts/build.sh
        ./scripts/build.sh

    - name: Customize rootfs
      run: |
        chmod +x scripts/customize.sh
        ./scripts/customize.sh

    - name: Create SquashFS
      run: |
        sudo mksquashfs rootfs filesystem.squashfs \
          -comp xz \
          -wildcards \
          -e boot

    - name: Prepare ISO structure
      run: |
        mkdir -p iso/live

        sudo cp filesystem.squashfs iso/live/

        sudo cp rootfs/boot/vmlinuz-* iso/live/vmlinuz
        sudo cp rootfs/boot/initrd.img-* iso/live/initrd.img

    - name: Build GRUB EFI
      run: |
        chmod +x scripts/grub.sh
        ./scripts/grub.sh

    - name: Build ISO
      run: |
        chmod +x scripts/make_iso.sh
        ./scripts/make_iso.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: DuyKhanhOS-ISO
        path: output/*.iso

name: Build DuyKhanhOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y debootstrap squashfs-tools xorriso grub-pc-bin

    - name: Build rootfs
      run: |
        chmod +x scripts/build.sh
        ./scripts/build.sh

    - name: Create squashfs
      run: |
        sudo mksquashfs rootfs filesystem.squashfs

    - uses: actions/upload-artifact@v4
      with:
        name: DuyKhanhOS
        path: filesystem.squashfs

name: Build DuyKhanhOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:

      - uses: actions/checkout@v4

      ##################################################
      # Dependencies
      ##################################################

      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            debootstrap \
            squashfs-tools \
            xorriso \
            grub-common \
            grub-pc-bin \
            grub-efi-amd64-bin \
            grub2-common \
            mtools \
            dosfstools \
            rsync \
            git

      ##################################################
      # Clone Calamares upstream
      ##################################################

      - name: Clone Calamares
        run: |
          git clone --depth=1 -b calamares \
            https://github.com/calamares/calamares.git

          mkdir -p config/calamares/modules
          mkdir -p config/calamares/branding

          cp calamares/settings.conf \
             config/calamares/

          find calamares/src/modules \
            -name "*.conf" \
            -exec cp {} config/calamares/modules/ \;

          cp -r calamares/src/branding/default \
            config/calamares/branding/duykhanhos

          sed -i \
            's/^branding:.*/branding: duykhanhos/' \
            config/calamares/settings.conf

      ##################################################
      # Build rootfs
      ##################################################

      - name: Build rootfs
        run: |
          chmod +x scripts/build.sh
          sudo ./scripts/build.sh

      ##################################################
      # Customize rootfs
      ##################################################

      - name: Customize rootfs
        run: |
          chmod +x scripts/customize.sh
          sudo ./scripts/customize.sh

      ##################################################
      # Debug boot files
      ##################################################

      - name: Show boot files
        run: |
          sudo ls -lah rootfs/boot

      ##################################################
      # Create SquashFS
      ##################################################

      - name: Create SquashFS
        run: |
          sudo mksquashfs rootfs filesystem.squashfs \
            -comp zstd \
            -Xcompression-level 15 \
            -processors $(nproc) \
            -e boot

      ##################################################
      # Prepare live files
      ##################################################

      - name: Prepare ISO structure
        run: |
          mkdir -p iso/live

          sudo cp filesystem.squashfs iso/live/

          KERNEL=$(sudo find rootfs/boot -name "vmlinuz-*" | head -n1)
          INITRD=$(sudo find rootfs/boot -name "initrd.img-*" | head -n1)

          sudo cp "$KERNEL" iso/live/vmlinuz
          sudo cp "$INITRD" iso/live/initrd.img

      ##################################################
      # Debug live files
      ##################################################

      - name: Debug ISO files
        run: |
          ls -lah iso/live

      ##################################################
      # Prepare GRUB
      ##################################################

      - name: Build GRUB
        run: |
          chmod +x scripts/grub.sh
          sudo ./scripts/grub.sh

      ##################################################
      # Create ISO
      ##################################################

      - name: Build ISO
        run: |
          chmod +x scripts/make_iso.sh
          sudo ./scripts/make_iso.sh

      ##################################################
      # Fix ownership
      ##################################################

      - name: Fix ownership
        run: |
          sudo chown -R $USER:$USER output

      ##################################################
      # SHA256
      ##################################################

      - name: Generate SHA256
        run: |
          sha256sum output/DuyKhanhOS-5.0-final-amd64.iso \
            > output/sha256sum.txt

      ##################################################
      # Upload Artifact
      ##################################################

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DuyKhanhOS-5.0-final-amd64
          path: |
            output/DuyKhanhOS-5.0-final-amd64.iso
            output/sha256sum.txt

      ##################################################
      # Create Release
      ##################################################

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v5.0-final
          name: DuyKhanhOS v5.0-final
          files: |
            output/DuyKhanhOS-5.0-final-amd64.iso
            output/sha256sum.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
